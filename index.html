<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>住宅ローン・ライフプランシミュレーター</title>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* スクロールバーを隠すユーティリティ（Tailwindのscrollbar-hideの代用） */
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    /* アニメーション設定 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, Fragment } = React;

    // --- アイコンコンポーネント (Lucide Reactの代替としてインラインSVGを定義) ---
    const Home = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>);
    const TrendingUp = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>);
    const Calculator = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="18" y2="18"/></svg>);
    const PiggyBank = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 5c-1.5 0-2.8 1.4-3 2-3.5-1.5-11-.3-11 5 0 1.8 0 3 2 4.5V20h4v-2h3v2h4v-4c1-.5 1.5-1 2-1.5L20 13c0-1-1.5-3-2-3.5-1-1-1-2-1-2z"/><path d="M2 9v1c0 1.1.9 2 2 2h1"/><path d="M16 11h.01"/></svg>);
    const LineChart = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>);
    const AlertCircle = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>);
    const CheckCircle2 = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>);
    const ChevronRight = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>);
    const Info = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>);
    const Receipt = ({ className }) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17V7"/></svg>);

    // --- 数理計算ユーティリティ ---
    const calculatePV = (rate, nper, pmt) => {
      if (rate === 0) return pmt * nper;
      const r = rate / 100 / 12;
      return pmt * ((1 - Math.pow(1 + r, -nper)) / r);
    };

    const calculatePMT = (rate, nper, pv) => {
      if (rate === 0) return pv / nper;
      const r = rate / 100 / 12;
      return (pv * r) / (1 - Math.pow(1 + r, -nper));
    };

    const formatCurrency = (amount) => {
      return Math.round(amount).toLocaleString();
    };

    function MortgageSimulator() {
      // --- State定義 ---
      const [activeTab, setActiveTab] = useState('budget');
      
      // シミュレーション用初期値
      const initialInputs = {
        age: 35,                // 現在の年齢
        income: 700,            // 世帯年収(万円)
        rent: 12,               // 現在の家賃(万円/月)
        savings: 500,           // 現在の貯蓄(万円)
        monthlySavings: 5,      // 毎月の貯蓄額(万円)
        loanYears: 35,          // 希望返済期間(年)
        interestRate: 0.5,      // 適用金利(%)
        futureInterestRate: 1.0,// 3年後の想定金利(%)
        waitingYears: 3         // 頭金を貯める待機期間(年)
      };

      // 固定資産税用State（画像に合わせた初期値）
      const [taxInputs, setTaxInputs] = useState({
        buildingEval: 1750,      // 建物固定資産税評価額
        buildingType: 'house',   // 'house' or 'apartment'
        buildingStructure: 'wood',
        buildingFloors: 2,
        roomUsage: 'home',       // 'home' or 'none'
        roomCount: 1,
        roomArea: 115,
        landArea: 165,
        landEval: 1400
      });

      // フォーム入力用のState
      const [draftInputs, setDraftInputs] = useState(initialInputs);
      // 計算実行用のState
      const [inputs, setInputs] = useState(initialInputs);

      const handleChange = (e) => {
        const { name, value } = e.target;
        setDraftInputs(prev => ({
          ...prev,
          [name]: parseFloat(value) || 0
        }));
      };

      const handleTaxChange = (e) => {
        const { name, value, type } = e.target;
        setTaxInputs(prev => ({
          ...prev,
          [name]: type === 'radio' ? value : (type === 'number' ? parseFloat(value) || 0 : value)
        }));
      };

      // 計算ボタン押下時の処理
      const handleCalculate = () => {
        setInputs(draftInputs);
      };

      // --- 計算ロジック ---

      // 1. 適正予算シミュレーション
      const budgetData = useMemo(() => {
        const safeMonthlyPayment = inputs.rent; 
        const maxLoanAmount = calculatePV(inputs.interestRate, inputs.loanYears * 12, safeMonthlyPayment);
        const propertyBudget = maxLoanAmount + (inputs.savings * 0.5);

        return {
          safeMonthlyPayment,
          maxLoanAmount,
          propertyBudget,
          downPayment: inputs.savings * 0.5
        };
      }, [inputs]);

      // 2. 賃貸 vs 持ち家
      const compareData = useMemo(() => {
        const years = 50; 
        const totalRentCost = (inputs.rent * 12 * years) + (inputs.rent * (years / 2));
        
        const principal = budgetData.maxLoanAmount;
        const monthlyPMT = calculatePMT(inputs.interestRate, inputs.loanYears * 12, principal);
        const totalLoanCost = (monthlyPMT * inputs.loanYears * 12) + budgetData.downPayment;
        const maintenanceCost = 30 * years;
        const totalOwnCost = totalLoanCost + maintenanceCost;

        const assetValue = budgetData.propertyBudget * 0.4;
        const netOwnCost = totalOwnCost - assetValue;

        return { totalRentCost, totalOwnCost, assetValue, netOwnCost };
      }, [inputs, budgetData]);

      // 3. 今すぐ vs 頭金を貯めてから
      const timingData = useMemo(() => {
        const loanAmountNow = budgetData.propertyBudget - budgetData.downPayment;
        const monthlyPMTNow = calculatePMT(inputs.interestRate, inputs.loanYears * 12, loanAmountNow);
        const totalPaymentNow = monthlyPMTNow * inputs.loanYears * 12 + budgetData.downPayment;

        const extraSavings = inputs.monthlySavings * 12 * inputs.waitingYears;
        const wastedRent = inputs.rent * 12 * inputs.waitingYears;
        const downPaymentLater = budgetData.downPayment + extraSavings;
        const loanAmountLater = budgetData.propertyBudget - downPaymentLater;
        
        const monthlyPMTLater = calculatePMT(inputs.futureInterestRate, inputs.loanYears * 12, loanAmountLater);
        const totalPaymentLater = (monthlyPMTLater * inputs.loanYears * 12) + downPaymentLater + wastedRent;

        const diff = totalPaymentLater - totalPaymentNow;

        return {
          now: { monthly: monthlyPMTNow, total: totalPaymentNow, interestRate: inputs.interestRate },
          later: { monthly: monthlyPMTLater, total: totalPaymentLater, interestRate: inputs.futureInterestRate, wastedRent },
          diff
        };
      }, [inputs, budgetData]);

      // 4. 住宅ローン減税シミュレーション（中古住宅・その他の住宅を想定）
      const taxData = useMemo(() => {
        let balance = budgetData.maxLoanAmount;
        let totalTaxReturn = 0;
        const yearlyReturns = [];
        const monthlyPMT = calculatePMT(inputs.interestRate, inputs.loanYears * 12, balance);
        const maxLoanLimit = 2000; // 中古住宅（その他の住宅）の借入対象限度額(万円)

        for (let year = 1; year <= 10; year++) { // 控除期間は10年
          for(let m = 0; m < 12; m++){
             const interest = balance * (inputs.interestRate / 100 / 12);
             const principalPayment = monthlyPMT - interest;
             balance -= principalPayment;
          }
          
          // 対象となる残高は実際の残高か2000万円の低い方
          const eligibleBalance = Math.min(balance, maxLoanLimit);
          const taxReturn = eligibleBalance * 0.007; // 控除率は0.7%
          
          totalTaxReturn += taxReturn;
          yearlyReturns.push({ year, return: taxReturn, balance });
        }

        return { totalTaxReturn, yearlyReturns };
      }, [inputs, budgetData]);

      // 5. キャッシュフロー予測
      const cfData = useMemo(() => {
        const data = [];
        let currentSavings = inputs.savings;
        const netIncome = inputs.income * 0.8; 
        const baseLivingCost = netIncome - (inputs.rent * 12) - (inputs.monthlySavings * 12);
        
        for (let i = 0; i <= 40; i++) {
          const currentAge = inputs.age + i;
          let yearlyIncome = netIncome;
          if (currentAge > 60 && currentAge <= 65) yearlyIncome = netIncome * 0.5;
          if (currentAge > 65) yearlyIncome = 240;

          let educationCost = 0;
          if (i >= 5 && i < 15) educationCost = 50;
          if (i >= 15 && i < 19) educationCost = 150; 

          const isPayingLoan = i < inputs.loanYears;
          const housingCost = isPayingLoan ? (budgetData.safeMonthlyPayment * 12) + 30 : 30;

          const totalCost = baseLivingCost + educationCost + housingCost;
          currentSavings = currentSavings + yearlyIncome - totalCost;

          data.push({
            age: currentAge,
            income: yearlyIncome,
            cost: totalCost,
            savings: currentSavings
          });
        }
        return data;
      }, [inputs, budgetData]);

      // 6. 固定資産税・都市計画税計算
      const taxCalcData = useMemo(() => {
        const bEval = taxInputs.buildingEval;
        const lEval = taxInputs.landEval;
        const lArea = taxInputs.landArea;
        const bArea = taxInputs.roomArea;
        
        // 建物固定資産税
        const bTax = bEval * 0.014;
        
        // 建物都市計画税
        const bCityTax = bEval * 0.003;
        
        // 新築軽減
        let bTaxReduced = bTax;
        let reducedYears = 0;
        if (taxInputs.roomUsage === 'home' && bArea >= 50 && bArea <= 280) {
          const limitArea = Math.min(bArea, 120);
          const reduceAmount = (bEval / bArea) * limitArea * 0.014 * 0.5;
          bTaxReduced = bTax - reduceAmount;
          reducedYears = taxInputs.buildingType === 'house' ? 3 : 5;
        }

        // 土地固定資産税（住宅用地の特例）
        let lTax = lEval * 0.014;
        if (taxInputs.roomUsage === 'home') {
          const smallArea = Math.min(lArea, 200 * taxInputs.roomCount);
          const generalArea = Math.max(lArea - 200 * taxInputs.roomCount, 0);
          const specialEval = lEval * (smallArea / lArea * (1/6) + generalArea / lArea * (1/3));
          lTax = specialEval * 0.014;
        }

        // 土地都市計画税
        let lCityTax = lEval * 0.003;
        if (taxInputs.roomUsage === 'home') {
          const smallArea = Math.min(lArea, 200 * taxInputs.roomCount);
          const generalArea = Math.max(lArea - 200 * taxInputs.roomCount, 0);
          const specialEval = lEval * (smallArea / lArea * (1/3) + generalArea / lArea * (2/3));
          lCityTax = specialEval * 0.003;
        }

        const total = bTax + bCityTax + lTax + lCityTax;
        const totalReduced = bTaxReduced + bCityTax + lTax + lCityTax;

        // 小数点第1位で丸めるヘルパー関数
        const round1 = (num) => Math.round(num * 10) / 10;

        return {
          bTax: round1(bTax),
          bTaxReduced: round1(bTaxReduced),
          reducedYears,
          bCityTax: round1(bCityTax),
          lTax: round1(lTax),
          lCityTax: round1(lCityTax),
          total: round1(total),
          totalReduced: round1(totalReduced)
        };
      }, [taxInputs]);

      // --- SVGグラフレンダリング用 ---
      const renderCFGraph = () => {
        const width = 800;
        const height = 300;
        const padding = 40;
        
        const minSavings = Math.min(0, ...cfData.map(d => d.savings));
        const maxSavings = Math.max(1000, ...cfData.map(d => d.savings));
        const maxVal = Math.max(maxSavings, Math.abs(minSavings)) * 1.1;
        
        const scaleX = (width - padding * 2) / (cfData.length - 1);
        const scaleY = (height - padding * 2) / (maxVal * 2);

        const points = cfData.map((d, i) => {
          const x = padding + i * scaleX;
          const y = height / 2 - d.savings * scaleY;
          return `${x},${y}`;
        }).join(' ');

        const zeroY = height / 2;

        return (
          <div className="w-full overflow-x-auto mt-6">
            <svg viewBox={`0 0 ${width} ${height}`} className="w-full min-w-[600px] h-auto bg-white rounded-lg border border-gray-100">
              <line x1={padding} y1={zeroY} x2={width - padding} y2={zeroY} stroke="#e5e7eb" strokeWidth="2" />
              
              {[1000, 2000, 3000].map(val => (
                <Fragment key={val}>
                  <line x1={padding} y1={height/2 - val*scaleY} x2={width-padding} y2={height/2 - val*scaleY} stroke="#f3f4f6" strokeDasharray="4" />
                  <text x={padding - 35} y={height/2 - val*scaleY + 4} fontSize="10" fill="#9ca3af">{val}万</text>
                </Fragment>
              ))}
              
              <polyline
                points={points}
                fill="none"
                stroke="#3b82f6"
                strokeWidth="3"
                strokeLinecap="round"
                strokeLinejoin="round"
              />
              
              {cfData.filter((_, i) => i % 5 === 0).map((d, i) => {
                const x = padding + (i * 5) * scaleX;
                const y = height / 2 - d.savings * scaleY;
                return (
                  <g key={d.age}>
                    <circle cx={x} cy={y} r="4" fill="#2563eb" />
                    <text x={x} y={height - 10} fontSize="12" fill="#6b7280" textAnchor="middle">{d.age}歳</text>
                  </g>
                );
              })}
            </svg>
            <p className="text-center text-sm text-gray-500 mt-2">※青線：金融資産残高（万円）の推移</p>
          </div>
        );
      };

      return (
        <div className="flex flex-col lg:flex-row min-h-screen bg-slate-50 font-sans text-slate-800">
          {/* 左側: 入力パネル */}
          <div className="w-full lg:w-80 bg-white border-r border-slate-200 shadow-sm z-10 flex flex-col h-auto lg:h-screen sticky top-0">
            <div className="p-5 bg-blue-900 text-white">
              <h1 className="text-xl font-bold flex items-center gap-2">
                <Home className="w-6 h-6" />
                住まいと人生の相談室
              </h1>
              <p className="text-blue-200 text-sm mt-1">プロフェッショナル提案ツール</p>
            </div>
            
            <div className="p-6 flex-1 overflow-y-auto space-y-6">
              <section>
                <h2 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">お客様の現状</h2>
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium mb-1">現在の年齢</label>
                    <div className="flex items-center gap-2">
                      <input type="number" name="age" value={draftInputs.age} onChange={handleChange} className="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                      <span className="text-slate-500">歳</span>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">世帯年収</label>
                    <div className="flex items-center gap-2">
                      <input type="number" name="income" value={draftInputs.income} onChange={handleChange} className="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                      <span className="text-slate-500">万円</span>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">現在の家賃（月額）</label>
                    <div className="flex items-center gap-2">
                      <input type="number" name="rent" value={draftInputs.rent} onChange={handleChange} className="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                      <span className="text-slate-500">万円</span>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">現在の貯蓄額</label>
                    <div className="flex items-center gap-2">
                      <input type="number" name="savings" value={draftInputs.savings} onChange={handleChange} className="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                      <span className="text-slate-500">万円</span>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">毎月の貯蓄ペース</label>
                    <div className="flex items-center gap-2">
                      <input type="number" name="monthlySavings" value={draftInputs.monthlySavings} onChange={handleChange} className="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                      <span className="text-slate-500">万円</span>
                    </div>
                  </div>
                </div>
              </section>

              <section>
                <h2 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">住宅ローン想定条件</h2>
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium mb-1">希望返済期間</label>
                    <div className="flex items-center gap-2">
                      <input type="number" name="loanYears" value={draftInputs.loanYears} onChange={handleChange} className="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                      <span className="text-slate-500">年</span>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium mb-1">想定金利（現在）</label>
                    <div className="flex items-center gap-2">
                      <input type="number" step="0.1" name="interestRate" value={draftInputs.interestRate} onChange={handleChange} className="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" />
                      <span className="text-slate-500">%</span>
                    </div>
                  </div>
                </div>
              </section>

              <div className="pt-4 border-t border-slate-100">
                <button
                  onClick={handleCalculate}
                  className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-colors flex items-center justify-center gap-2"
                >
                  <Calculator className="w-5 h-5" />
                  計算する
                </button>
              </div>
            </div>
          </div>

          {/* 右側: メインコンテンツ（結果表示） */}
          <div className="flex-1 flex flex-col h-screen overflow-hidden">
            
            {/* タブナビゲーション */}
            <div className="bg-white border-b border-slate-200 shadow-sm flex overflow-x-auto scrollbar-hide">
              {[
                { id: 'budget', icon: Calculator, label: '適正予算' },
                { id: 'compare', icon: Home, label: '賃貸 vs 持ち家' },
                { id: 'timing', icon: TrendingUp, label: '買うタイミング' },
                { id: 'tax', icon: PiggyBank, label: '税制優遇' },
                { id: 'propertyTax', icon: Receipt, label: '固定資産税' },
                { id: 'cf', icon: LineChart, label: '生涯キャッシュフロー' },
              ].map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex items-center gap-2 px-6 py-4 text-sm font-bold whitespace-nowrap border-b-2 transition-colors ${
                    activeTab === tab.id 
                      ? 'border-blue-600 text-blue-600 bg-blue-50/50' 
                      : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                  }`}
                >
                  <tab.icon className="w-4 h-4" />
                  {tab.label}
                </button>
              ))}
            </div>

            {/* タブコンテンツ */}
            <div className="flex-1 overflow-y-auto p-4 md:p-8">
              <div className="max-w-4xl mx-auto">
                
                {/* タブ1: 適正予算 */}
                {activeTab === 'budget' && (
                  <div className="animate-in">
                    <div className="mb-8">
                      <h2 className="text-2xl font-bold text-slate-800">「借りられる額」ではなく「返せる額」から逆算する</h2>

                    </div>

                    <div className="grid md:grid-cols-2 gap-6">
                      <div className="bg-white rounded-2xl p-8 border border-slate-200 shadow-sm relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-2 h-full bg-blue-500"></div>
                        <p className="text-sm font-semibold text-slate-500 mb-2">お客様の適正借入予算</p>
                        <div className="flex items-baseline gap-2">
                          <span className="text-5xl font-extrabold text-slate-800">{formatCurrency(budgetData.propertyBudget)}</span>
                          <span className="text-xl text-slate-600">万円</span>
                        </div>
                        
                        <div className="mt-8 space-y-4">
                          <div className="flex justify-between items-center py-3 border-b border-slate-100">
                            <span className="text-slate-600">借入可能額（ローン）</span>
                            <span className="font-bold">{formatCurrency(budgetData.maxLoanAmount)} 万円</span>
                          </div>
                          <div className="flex justify-between items-center py-3 border-b border-slate-100">
                            <span className="text-slate-600">充当する自己資金</span>
                            <span className="font-bold">{formatCurrency(budgetData.downPayment)} 万円</span>
                          </div>
                          <div className="flex justify-between items-center py-3">
                            <span className="text-slate-600">毎月のローン返済額</span>
                            <span className="font-bold text-blue-600 text-lg">{formatCurrency(budgetData.safeMonthlyPayment * 10000)} 円</span>
                          </div>
                        </div>
                      </div>

                      <div className="bg-blue-50 rounded-2xl p-8 border border-blue-100">
                        <div className="flex items-start gap-3">
                          <CheckCircle2 className="w-6 h-6 text-blue-600 flex-shrink-0" />
                          <div>
                            <h3 className="font-bold text-slate-800 mb-2">プロからのアドバイス</h3>
                            <p className="text-slate-600 text-sm leading-relaxed">
                              金融機関の審査基準ではもっと多く借りられる可能性がありますが、大切なのは「購入後も旅行や趣味、教育費を我慢しないこと」です。<br/><br/>
                              今の家賃と同じ支払額をキープできれば、生活水準を下げることなく、マイホームという資産を手に入れることができます。
                            </p>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* タブ2: 賃貸 vs 持ち家 */}
                {activeTab === 'compare' && (
                  <div className="animate-in">
                     <div className="mb-8">
                      <h2 className="text-2xl font-bold text-slate-800">50年間の住居費比較</h2>
                      <p className="text-slate-600 mt-2">「一生賃貸」と「今、購入」の生涯コストを比較。掛け捨ての家賃と、資産になる持ち家の違いが明白です。</p>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8 mb-8">
                      {/* 賃貸 */}
                      <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                        <div className="bg-slate-100 p-4 text-center border-b border-slate-200">
                          <h3 className="font-bold text-slate-700">一生賃貸に住み続けた場合</h3>
                        </div>
                        <div className="p-6">
                          <p className="text-sm text-slate-500 mb-1">50年間の総支払額</p>
                          <div className="flex items-baseline gap-2 mb-6">
                            <span className="text-4xl font-bold text-slate-800">{formatCurrency(compareData.totalRentCost)}</span>
                            <span className="text-slate-600">万円</span>
                          </div>
                          <div className="space-y-2 text-sm text-slate-600">
                            <div className="flex justify-between">
                              <span>家賃支払い</span>
                              <span>{formatCurrency(inputs.rent * 12 * 50)} 万円</span>
                            </div>
                            <div className="flex justify-between">
                              <span>更新料等</span>
                              <span>{formatCurrency(compareData.totalRentCost - (inputs.rent * 12 * 50))} 万円</span>
                            </div>
                          </div>
                          <div className="mt-6 pt-6 border-t border-slate-100">
                            <p className="text-sm font-bold text-red-500 flex items-center gap-1">
                              <AlertCircle className="w-4 h-4" />
                              最終的に手元に残る資産は 0円
                            </p>
                          </div>
                        </div>
                      </div>

                      {/* 持ち家 */}
                      <div className="bg-white rounded-2xl border-2 border-blue-500 overflow-hidden shadow-md relative">
                        <div className="absolute top-0 right-0 bg-blue-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg">
                          おすすめ
                        </div>
                        <div className="bg-blue-50 p-4 text-center border-b border-blue-100">
                          <h3 className="font-bold text-blue-900">今の予算で家を買った場合</h3>
                        </div>
                        <div className="p-6">
                          <p className="text-sm text-slate-500 mb-1">実質負担額（総支払 - 資産価値）</p>
                          <div className="flex items-baseline gap-2 mb-6">
                            <span className="text-4xl font-bold text-blue-600">{formatCurrency(compareData.netOwnCost)}</span>
                            <span className="text-slate-600">万円</span>
                          </div>
                          <div className="space-y-2 text-sm text-slate-600">
                            <div className="flex justify-between">
                              <span>総支払額(ローン+維持費)</span>
                              <span>{formatCurrency(compareData.totalOwnCost)} 万円</span>
                            </div>
                            <div className="flex justify-between text-blue-600 font-medium">
                              <span>50年後の残存資産価値</span>
                              <span>▲ {formatCurrency(compareData.assetValue)} 万円</span>
                            </div>
                          </div>
                          <div className="mt-6 pt-6 border-t border-slate-100">
                            <p className="text-sm font-bold text-emerald-600 flex items-center gap-1">
                              <CheckCircle2 className="w-4 h-4" />
                              土地という資産が家族に残ります
                            </p>
                          </div>
                        </div>
                      </div>
                    </div>

                     <div className="bg-slate-800 text-white rounded-xl p-6 flex items-start gap-4">
                        <Info className="w-6 h-6 text-blue-400 flex-shrink-0 mt-1" />
                        <p className="text-sm leading-relaxed">
                          老後、年金生活になった際に毎月{inputs.rent}万円の家賃を払い続けるのは大きな負担になります。持ち家なら、ローン完済後は修繕費と税金のみとなり、老後のキャッシュフローが圧倒的に安定します。
                        </p>
                      </div>
                  </div>
                )}

                {/* タブ3: 買うタイミング */}
                {activeTab === 'timing' && (
                  <div className="animate-in">
                    <div className="mb-8">
                      <h2 className="text-2xl font-bold text-slate-800">「頭金を貯めてから」の落とし穴</h2>
                      <p className="text-slate-600 mt-2">「あと{inputs.waitingYears}年で頭金を貯めてから買おう」は本当にお得でしょうか？金利上昇リスクと掛け捨て家賃を加味して検証します。</p>
                    </div>

                    <div className="flex flex-col md:flex-row gap-4 items-stretch mb-8">
                      <div className="flex-1 bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                        <h3 className="font-bold text-slate-700 mb-4 pb-2 border-b">今すぐ購入（金利 {timingData.now.interestRate}%）</h3>
                        <div className="text-3xl font-bold text-slate-800 mb-2">{formatCurrency(timingData.now.total)}<span className="text-base font-normal text-slate-500 ml-1">万円</span></div>
                        <p className="text-sm text-slate-500">総支払額（頭金含む）</p>
                      </div>

                      <div className="hidden md:flex items-center justify-center">
                        <ChevronRight className="w-8 h-8 text-slate-300" />
                      </div>

                      <div className="flex-1 bg-white p-6 rounded-xl border border-slate-200 shadow-sm opacity-80">
                        <h3 className="font-bold text-slate-700 mb-4 pb-2 border-b">{inputs.waitingYears}年後に購入（金利 {timingData.later.interestRate}%想定）</h3>
                        <div className="text-3xl font-bold text-slate-800 mb-2">{formatCurrency(timingData.later.total)}<span className="text-base font-normal text-slate-500 ml-1">万円</span></div>
                        <p className="text-sm text-slate-500">総支払額＋待機期間の家賃</p>
                        <div className="mt-3 text-sm text-red-500 bg-red-50 p-2 rounded">
                          待機中の家賃損失：{formatCurrency(timingData.later.wastedRent)}万円
                        </div>
                      </div>
                    </div>

                    <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-8 text-white text-center shadow-lg">
                      <p className="text-blue-100 font-medium mb-2">シミュレーション結果</p>
                      <h3 className="text-2xl md:text-3xl font-bold mb-4">
                        実は「今すぐ購入」した方が<br className="md:hidden"/>
                        <span className="text-yellow-300 text-4xl md:text-5xl mx-2">{formatCurrency(timingData.diff)}</span>万円 お得です
                      </h3>
                      <p className="text-sm text-blue-100 max-w-2xl mx-auto leading-relaxed">
                        頭金を貯める努力は素晴らしいですが、その間に支払う「家賃」は1円も戻ってきません。また、将来わずかに金利が上がるだけで、貯めた頭金以上の利息負担が増えるケースがほとんどです。「早く買って、早くローンを終わらせる」のが最も賢明な選択です。
                      </p>
                    </div>
                  </div>
                )}

                {/* タブ4: 税制優遇 */}
                {activeTab === 'tax' && (
                  <div className="animate-in">
                    <div className="mb-8">
                      <h2 className="text-2xl font-bold text-slate-800">住宅ローン減税の絶大な効果（中古住宅）</h2>
                      <p className="text-slate-600 mt-2">国からの補助金とも言える「住宅ローン減税」。今回は「中古住宅（その他の住宅）」を購入した場合（借入限度額2,000万円、控除期間10年間）で試算しました。</p>
                    </div>

                    <div className="flex flex-col md:flex-row gap-8 items-center mb-10">
                      <div className="w-full md:w-1/3 bg-white p-8 rounded-full aspect-square flex flex-col items-center justify-center border-8 border-blue-50 shadow-lg">
                        <p className="text-slate-500 font-semibold mb-2">10年間の最大還付額</p>
                        <div className="text-5xl font-black text-blue-600">{formatCurrency(taxData.totalTaxReturn)}</div>
                        <p className="text-slate-500 mt-1">万円</p>
                      </div>
                      
                      <div className="flex-1 space-y-4">
                        <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-start gap-3">
                          <div className="bg-green-100 p-2 rounded-lg"><PiggyBank className="w-5 h-5 text-green-600" /></div>
                          <div>
                            <h4 className="font-bold text-slate-800">実質的な金利負担が大きく軽減</h4>
                            <p className="text-sm text-slate-600 mt-1">借入残高（最大2,000万円）の0.7%、つまり最大で年間14万円が10年間にわたり所得税等から還付されます。</p>
                          </div>
                        </div>
                        <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-start gap-3">
                          <div className="bg-orange-100 p-2 rounded-lg"><AlertCircle className="w-5 h-5 text-orange-600" /></div>
                          <div>
                            <h4 className="font-bold text-slate-800">新築と中古で異なる制度</h4>
                            <p className="text-sm text-slate-600 mt-1">新築住宅の場合は控除期間が13年、借入限度額も大きくなりますが、中古住宅でも条件を満たせば10年間の手厚い控除が受けられます。</p>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                      <h4 className="font-bold text-slate-700 mb-4">減税額の推移（概算）</h4>
                      <div className="h-48 flex items-end gap-2">
                        {taxData.yearlyReturns.map((item) => (
                          <div key={item.year} className="flex-1 flex flex-col items-center gap-2 group">
                            <div className="w-full bg-blue-100 rounded-t-sm relative transition-all duration-300 group-hover:bg-blue-300" 
                                 style={{ height: `${(item.return / 14) * 100}%`, minHeight: '4px' }}>
                               <span className="absolute -top-6 left-1/2 -translate-x-1/2 text-xs font-bold text-blue-600 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
                                 {formatCurrency(item.return)}万
                               </span>
                            </div>
                            <span className="text-xs text-slate-400">{item.year}年</span>
                          </div>
                        ))}
                      </div>
                      <p className="text-xs text-slate-400 mt-4 text-center">※中古住宅（その他の住宅）の借入限度額2,000万円を上限として計算しています。※お客様の所得税・住民税の納税額が上限となります。</p>
                    </div>
                  </div>
                )}

                {/* タブ5: 固定資産税・都市計画税 */}
                {activeTab === 'propertyTax' && (
                  <div className="animate-in">
                    <div className="mb-8">
                      <h2 className="text-2xl font-bold text-slate-800">固定資産税・都市計画税の試算</h2>
                      <p className="text-slate-600 mt-2">建物の形態や評価額を入力して、毎年の固定資産税と都市計画税の概算額を計算します。</p>
                    </div>

                    <div className="grid lg:grid-cols-2 gap-8">
                      {/* 入力エリア */}
                      <div className="space-y-6">
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                          <h3 className="inline-block bg-slate-200 text-slate-700 font-bold px-3 py-1 rounded text-sm mb-4">建物について</h3>
                          <div className="space-y-4">
                            <div className="flex flex-wrap items-center justify-between gap-2">
                              <label className="text-sm font-medium">Q1. 固定資産税評価額は？</label>
                              <div className="flex items-center gap-1">
                                <input type="number" name="buildingEval" value={taxInputs.buildingEval} onChange={handleTaxChange} className="w-24 p-1 border rounded text-right bg-yellow-50 focus:ring-2 focus:ring-blue-500 outline-none" />
                                <span className="text-sm">万円</span>
                              </div>
                            </div>
                            <div className="flex flex-wrap items-center justify-between gap-2">
                              <label className="text-sm font-medium">Q2. 建物形態は？</label>
                              <div className="flex items-center gap-4 text-sm">
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="buildingType" value="apartment" checked={taxInputs.buildingType === 'apartment'} onChange={handleTaxChange} /> 集合型</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="buildingType" value="house" checked={taxInputs.buildingType === 'house'} onChange={handleTaxChange} /> 戸建</label>
                              </div>
                            </div>
                            <div className="flex flex-wrap items-center justify-between gap-2">
                              <label className="text-sm font-medium">Q3. 建物構造は？</label>
                              <select name="buildingStructure" value={taxInputs.buildingStructure} onChange={handleTaxChange} className="border p-1 rounded text-sm w-32 focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="wood">木造</option>
                                <option value="steel">鉄骨造</option>
                                <option value="rc">RC造</option>
                              </select>
                            </div>
                            <div className="flex flex-wrap items-center justify-between gap-2">
                              <label className="text-sm font-medium">Q4. 地上階数は？</label>
                              <div className="flex items-center gap-1">
                                <input type="number" name="buildingFloors" value={taxInputs.buildingFloors} onChange={handleTaxChange} className="w-16 p-1 border rounded text-right focus:ring-2 focus:ring-blue-500 outline-none" />
                                <span className="text-sm">階</span>
                              </div>
                            </div>
                            
                            <div className="mt-4 border-t border-slate-100 pt-4">
                              <label className="text-sm font-medium block mb-2">Q5. 部屋タイプは？</label>
                              <div className="overflow-x-auto">
                                <table className="w-full text-sm text-center border-collapse min-w-[300px]">
                                  <thead>
                                    <tr className="bg-slate-50 border-y border-slate-200">
                                      <th className="py-2 font-normal text-slate-500">タイプ</th>
                                      <th className="py-2 font-normal text-slate-500">用途</th>
                                      <th className="py-2 font-normal text-slate-500">戸数</th>
                                      <th className="py-2 font-normal text-slate-500">一戸当り面積</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    <tr className="border-b border-slate-100">
                                      <td className="py-2">1</td>
                                      <td>
                                        <select name="roomUsage" value={taxInputs.roomUsage} onChange={handleTaxChange} className="border rounded p-1 text-xs">
                                          <option value="home">自宅部分</option>
                                          <option value="none">なし</option>
                                        </select>
                                      </td>
                                      <td>
                                        <div className="flex items-center justify-center gap-1">
                                          <input type="number" name="roomCount" value={taxInputs.roomCount} onChange={handleTaxChange} className="w-12 border rounded p-1 text-right text-xs" /> <span>戸</span>
                                        </div>
                                      </td>
                                      <td>
                                        <div className="flex items-center justify-center gap-1">
                                          <input type="number" name="roomArea" value={taxInputs.roomArea} onChange={handleTaxChange} className="w-16 border rounded p-1 text-right text-xs" /> <span>㎡</span>
                                        </div>
                                      </td>
                                    </tr>
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                          <h3 className="inline-block bg-slate-200 text-slate-700 font-bold px-3 py-1 rounded text-sm mb-4">土地について</h3>
                          <div className="space-y-4">
                            <div className="flex flex-wrap items-center justify-between gap-2">
                              <label className="text-sm font-medium">Q6. 敷地面積は？</label>
                              <div className="flex items-center gap-1">
                                <input type="number" name="landArea" value={taxInputs.landArea} onChange={handleTaxChange} className="w-24 p-1 border rounded text-right focus:ring-2 focus:ring-blue-500 outline-none" />
                                <span className="text-sm">㎡</span>
                              </div>
                            </div>
                            <div className="flex flex-wrap items-center justify-between gap-2">
                              <label className="text-sm font-medium">Q7. 固定資産税評価額は？</label>
                              <div className="flex items-center gap-1">
                                <input type="number" name="landEval" value={taxInputs.landEval} onChange={handleTaxChange} className="w-24 p-1 border rounded text-right focus:ring-2 focus:ring-blue-500 outline-none" />
                                <span className="text-sm">万円</span>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>

                      {/* 結果エリア */}
                      <div className="bg-white p-6 md:p-8 rounded-xl border border-slate-200 shadow-sm h-fit sticky top-4">
                        <div className="space-y-6">
                          
                          <div>
                            <span className="inline-block bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm font-mono font-bold mb-2">A 1.</span>
                            <div className="text-slate-800 font-medium">
                              建物にかかる固定資産税額は･･･ <span className="text-2xl font-bold text-red-600">{taxCalcData.bTax}</span> <span className="text-sm">万円</span>
                              {taxCalcData.reducedYears > 0 && (
                                <div className="text-sm mt-1 text-slate-600">
                                  (新築軽減が適用される <span className="font-bold text-red-600">{taxCalcData.reducedYears}</span> 年間は･･･ <span className="font-bold text-red-600">{taxCalcData.bTaxReduced}</span> 万円)
                                </div>
                              )}
                            </div>
                          </div>

                          <div>
                            <span className="inline-block bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm font-mono font-bold mb-2">A 2.</span>
                            <div className="text-slate-800 font-medium">
                              建物にかかる都市計画税額は･･･ <span className="text-xl font-bold text-red-600">{taxCalcData.bCityTax}</span> <span className="text-sm">万円</span>
                            </div>
                          </div>

                          <div>
                            <span className="inline-block bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm font-mono font-bold mb-2">A 3.</span>
                            <div className="text-slate-800 font-medium">
                              土地にかかる固定資産税額は･･･ <span className="text-xl font-bold text-red-600">{taxCalcData.lTax}</span> <span className="text-sm">万円</span>
                            </div>
                          </div>

                          <div className="pb-6 border-b border-slate-200">
                            <span className="inline-block bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm font-mono font-bold mb-2">A 4.</span>
                            <div className="text-slate-800 font-medium">
                              土地にかかる都市計画税額は･･･ <span className="text-xl font-bold text-red-600">{taxCalcData.lCityTax}</span> <span className="text-sm">万円</span>
                            </div>
                          </div>

                          <div>
                            <span className="inline-block bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm font-mono font-bold mb-2">A 5.</span>
                            <div className="text-slate-800 font-bold mb-2">
                              固定資産税・都市計画税の合計は･･･
                            </div>
                            <div className="text-right">
                              <span className="text-4xl font-black text-red-600">{taxCalcData.total}</span> <span className="text-lg font-bold text-slate-600">万円</span>
                              {taxCalcData.reducedYears > 0 && (
                                <div className="text-sm text-slate-500 font-normal mt-1">
                                  (新築軽減適用期間中の合計: <span className="font-bold">{taxCalcData.totalReduced}</span> 万円)
                                </div>
                              )}
                            </div>
                          </div>

                        </div>
                      </div>

                    </div>
                  </div>
                )}

                {/* タブ6: キャッシュフロー */}
                {activeTab === 'cf' && (
                  <div className="animate-in">
                    <div className="mb-8">
                      <h2 className="text-2xl font-bold text-slate-800">未来の家計を「見える化」する</h2>
                      <p className="text-slate-600 mt-2">住宅購入後、教育費のピークや老後を迎えても家計が破綻しないか。安全性をグラフで確認します。</p>
                    </div>

                    <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm mb-6">
                      {renderCFGraph()}
                    </div>

                    <div className="grid md:grid-cols-3 gap-4">
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <h4 className="font-bold text-slate-700 text-sm mb-1">現在の年齢〜</h4>
                        <p className="text-xs text-slate-500">住宅ローン返済スタート。無理のない返済額に設定しているため、毎月の貯蓄も継続可能です。</p>
                      </div>
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <h4 className="font-bold text-slate-700 text-sm mb-1">10〜15年後</h4>
                        <p className="text-xs text-slate-500">教育費のピーク。一時的に貯蓄ペースが落ちますが、手元の資金がショートすることはありません。</p>
                      </div>
                      <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <h4 className="font-bold text-blue-800 text-sm mb-1">老後（ローン完済後）</h4>
                        <p className="text-xs text-blue-600">住居費負担が軽くなり、年金生活でも安心です。しっかり資産（家と現金）が残る計画です。</p>
                      </div>
                    </div>

                  </div>
                )}

              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MortgageSimulator />);
  </script>
</body>
</html>
